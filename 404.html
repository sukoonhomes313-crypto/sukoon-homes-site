<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="https://res.cloudinary.com/dv5erwivl/image/upload/v1779383751/IMG_3500_rwh6pl.png"/>
<link rel="apple-touch-icon" href="https://res.cloudinary.com/dv5erwivl/image/upload/v1779383751/IMG_3500_rwh6pl.png"/>
<title>Redirecting...</title>
<script>
(function(){
  const path = window.location.pathname;
  const parts = path.split('/').filter(Boolean);
  // /rooms/slug -> room.html?slug=slug
  if(parts[0]==='rooms' && parts[1]){
    window.location.replace('/room.html?slug='+encodeURIComponent(parts[1]));
  } else {
    window.location.replace('/');
  }
})();
</script>
</head>
<body></body>
</html>
